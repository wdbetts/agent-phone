<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Phone — Mock Phone</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .phone {
      width: 380px;
      background: #16213e;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .header {
      text-align: center;
      padding: 16px 0;
      border-bottom: 1px solid #333;
      margin-bottom: 16px;
    }
    .header h1 { font-size: 18px; color: #e94560; }
    .header .status { font-size: 13px; color: #888; margin-top: 4px; }
    #call-status { color: #4ecca3; }
    .messages {
      height: 400px;
      overflow-y: auto;
      padding: 8px;
      margin-bottom: 16px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #0f3460;
    }
    .message {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 85%;
      font-size: 14px;
      line-height: 1.4;
    }
    .message.assistant {
      background: #533483;
      margin-right: auto;
    }
    .message.user {
      background: #e94560;
      margin-left: auto;
    }
    .message .label {
      font-size: 11px;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .input-area {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #user-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #0f3460;
      color: #eee;
      font-size: 14px;
      outline: none;
    }
    #user-input:focus { border-color: #4ecca3; }
    #user-input:disabled { opacity: 0.5; }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    #send-btn {
      background: #4ecca3;
      color: #1a1a2e;
    }
    #send-btn:hover { background: #3db890; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #mic-btn {
      background: #0f3460;
      color: #eee;
      border: 1px solid #333;
      padding: 12px 14px;
      font-size: 16px;
      line-height: 1;
      display: none;
    }
    #mic-btn:hover { background: #1a4a7a; }
    #mic-btn.active {
      background: #e94560;
      border-color: #e94560;
      animation: mic-pulse 1.2s infinite;
    }
    @keyframes mic-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(233, 69, 96, 0); }
    }
    .voice-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 4px;
    }
    #voice-toggle {
      background: #0f3460;
      color: #888;
      border: 1px solid #333;
      padding: 8px 14px;
      font-size: 13px;
      flex-shrink: 0;
    }
    #voice-toggle:hover { background: #1a4a7a; }
    #voice-toggle.active {
      background: #4ecca3;
      color: #1a1a2e;
      border-color: #4ecca3;
    }
    #voice-status {
      font-size: 12px;
      color: #888;
      flex: 1;
      text-align: right;
    }
    #voice-status.listening { color: #e94560; }
    #voice-status.speaking { color: #4ecca3; }
    #hangup-btn {
      background: #e94560;
      color: white;
      margin-top: 12px;
      width: 100%;
      display: none;
    }
    #hangup-btn:hover { background: #d63851; }
    .waiting {
      text-align: center;
      padding: 40px;
      color: #888;
    }
    .waiting .ring {
      font-size: 48px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <h1>Agent Phone</h1>
      <div class="status">
        <span id="call-status">Waiting for call...</span>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="waiting" id="waiting">
        <div class="ring">📞</div>
        <p style="margin-top: 16px;">Waiting for Claude to call...</p>
      </div>
    </div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Type your response..." disabled />
      <button id="mic-btn" title="Start/stop microphone">🎤</button>
      <button id="send-btn" disabled>Send</button>
    </div>
    <div class="voice-controls">
      <button id="voice-toggle" title="Toggle voice mode">🔇 Voice Off</button>
      <span id="voice-status"></span>
    </div>
    <button id="hangup-btn">Hang Up</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
